appId: com.orchestratedspace.app
productName: Orchestrated Space
directories:
  output: release
  buildResources: build
files:
  - dist/**
  - electron/dist/**
  - node_modules/**
  - package.json
win:
  target: nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
asar: true
