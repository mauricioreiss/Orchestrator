appId: com.orchestratedspace.app
productName: Orchestrated Space
directories:
  output: release
  buildResources: build
files:
  - dist/**
  - electron/dist/**
  - node_modules/**
  - package.json
extraResources:
  - from: "_templates_personas"
    to: "_templates_personas"
asarUnpack:
  - "node_modules/better-sqlite3/**"
  - "node_modules/node-pty/**"
win:
  target: nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
asar: true
